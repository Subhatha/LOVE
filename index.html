<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicine Reminder 💊</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ffd6e7,#d6f5ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
width:90%;
max-width:350px;
}

h1{
font-size:24px;
margin-bottom:10px;
}

p{
color:#555;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.notify{
background:#ff7aa2;
color:white;
}

.calendar{
background:#6aa9ff;
color:white;
}

button:hover{
opacity:0.9;
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

.emoji{
font-size:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="emoji">💊</div>

<h1>Medicine Reminder</h1>

<p>Medicine time</p>

<p><b>10:00 AM & 10:00 PM</b></p>

<p>Reminder comes <b>10 minutes before</b></p>

<button class="notify" onclick="enableNotifications()">
🔔 Enable Reminder Notifications
</button>

<button class="calendar" onclick="downloadICS()">
📅 Add to Calendar
</button>

<div class="footer">
Stay healthy 💗
</div>

</div>

<script>

let lastReminder = null;

function enableNotifications(){

if(Notification.permission !== "granted"){
Notification.requestPermission();
}

setInterval(checkTime,60000);

alert("Notifications enabled! You will get reminders at 9:50 AM and 9:50 PM.");

}

function checkTime(){

const now = new Date();
const hour = now.getHours();
const minute = now.getMinutes();

const reminderKey = hour + ":" + minute;

/* Prevent duplicate notification */

if(lastReminder === reminderKey){
return;
}

/* 9:50 AM reminder */

if(hour === 9 && minute === 50){

showNotification("Take your medicine in 10 minutes (10:00 AM)");
lastReminder = reminderKey;

}

/* 9:50 PM reminder */

if(hour === 21 && minute === 50){

showNotification("Take your medicine in 10 minutes (10:00 PM)");
lastReminder = reminderKey;

}

}

function showNotification(message){

new Notification("💊 Medicine Reminder",{

body:message,
icon:"https://cdn-icons-png.flaticon.com/512/2966/2966327.png"

});

}

function downloadICS(){

const ics = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Medicine Reminder
DTSTART:20260307T095000
DTEND:20260307T100000
RRULE:FREQ=DAILY
DESCRIPTION:Take medicine at 10:00 AM
END:VEVENT
BEGIN:VEVENT
SUMMARY:Medicine Reminder
DTSTART:20260307T215000
DTEND:20260307T220000
RRULE:FREQ=DAILY
DESCRIPTION:Take medicine at 10:00 PM
END:VEVENT
END:VCALENDAR`;

const blob = new Blob([ics], {type:'text/calendar'});
const link = document.createElement('a');

link.href = URL.createObjectURL(blob);
link.download = "medicine_reminder.ics";

link.click();

}

</script>

</body>
</html>
